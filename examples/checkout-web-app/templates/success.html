<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Payment Complete</title>
  <link rel="stylesheet" href="/static/checkout.css">
</head>
<body>
  <main>
    <section class="shell">
      <div class="content">
        <div class="confirmed">
          <div class="check">OK</div>
          <h1>Payment Complete</h1>
          <dl class="record">
            <dt>Customer</dt><dd>{{.CustomerName}}</dd>
            <dt>Audio book</dt><dd>{{.ItemTitle}}</dd>
            <dt>Amount</dt><dd>{{.Currency}} {{.Amount}}</dd>
            <dt>Payment Reference</dt><dd>{{.PaymentReference}}</dd>
            <dt>Paid Via</dt><dd>{{.PaidVia}}</dd>
          </dl>
          <a class="button primary" href="{{.ReceiptURL}}">Download receipt</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
